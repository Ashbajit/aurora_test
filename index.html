<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // SHADER 1: Ghostly Aurora Overlay
      AFRAME.registerShader('ghostly-aurora', {
        schema: { time: {type: 'time', is: 'uniform'} },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
          precision highp float;
          varying vec2 vUv;
          uniform float time;
          void main() {
            float t = time / 2800.0;
            float streaks = sin(vUv.x * 22.0 + t + sin(vUv.x * 10.0 + t * 0.4) * 3.0);
            float mask = smoothstep(0.0, 0.5, vUv.y) * smoothstep(1.0, 0.5, vUv.y) * smoothstep(0.0, 0.2, vUv.x) * smoothstep(1.0, 0.8, vUv.x);
            gl_FragColor = vec4(mix(vec3(0.0, 1.0, 0.6), vec3(0.5, 0.1, 1.0), vUv.y + streaks * 0.1), abs(streaks) * mask * 0.5);
          }
        `
      });

      // SHADER 2: Lake Ripple + Star Blink
      AFRAME.registerShader('realistic-lake', {
        schema: { map: {type: 'map', is: 'uniform'}, time: {type: 'time', is: 'uniform'} },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `
          precision highp float;
          varying vec2 vUv;
          uniform sampler2D map;
          uniform float time;
          void main() {
            vec2 uv = vUv;
            float t = time / 1800.0;
            // Ripple bottom half
            if (uv.y < 0.46) {
                uv.x += sin(uv.y * 25.0 + t * 1.8) * 0.0025;
                uv.y += cos(uv.x * 18.0 + t * 1.2) * 0.0015;
            }
            vec4 color = texture2D(map, uv);
            // Blink bright points in top half
            float brightness = (color.r + color.g + color.b) / 3.0;
            if (uv.y > 0.5 && brightness > 0.82) {
                color.rgb *= (0.75 + 0.25 * abs(sin(t * 0.6 + uv.x * 120.0)));
            }
            gl_FragColor = color;
          }
        `
      });

      // Simple Tap-to-Play Audio Listener
      window.addEventListener('click', () => {
        const audio = document.querySelector('#ambient-sound');
        if (audio && audio.paused) {
          audio.play().catch(err => console.log("Audio play blocked", err));
        }
      });
    </script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="bkg" src="./bkg.jpg">
        <img id="girl" src="./girl_silhouette.png">
        <audio id="ambient-sound" src="./calm_night.mp3" preload="auto" loop="true"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-plane material="shader: realistic-lake; map: #bkg" width="1.6" height="1"></a-plane>

        <a-plane material="shader: ghostly-aurora; transparent: true" position="0 0.78 -0.08" rotation="-12 0 0" width="2.8" height="1.6"></a-plane>

        <a-text value="HEY, SIRI" position="-0.6 0.38 0.1" color="#ccffcc" width="1.8" align="center" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>

        <a-image src="#girl" position="0.6 -0.35 0.05" width="0.25" height="0.4" transparent="true"></a-image>

      </a-entity>
    </a-scene>
  </body>
</html>
